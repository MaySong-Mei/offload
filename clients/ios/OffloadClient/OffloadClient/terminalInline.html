<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
  #terminal { width: 100%; height: 100%; }
  .xterm { padding: 4px; }
</style>
<link rel="stylesheet" href="xterm.min.css">
</head>
<body>
<div id="terminal"></div>
<script src="xterm.min.js"></script>
<script src="addon-fit.min.js"></script>
<script>
(function() {
  const term = new Terminal({
    cursorBlink: false,
    cursorStyle: 'bar',
    disableStdin: true,
    scrollback: 0,
    fontSize: 12,
    lineHeight: 1.2,
    fontFamily: 'Menlo, Monaco, monospace',
    theme: {
      background: '#1a1a1a',
      foreground: '#d4d4d4',
      cursor: '#1a1a1a',
      selectionBackground: '#264f78',
      black: '#1a1a1a',
      red: '#f44747',
      green: '#6a9955',
      yellow: '#d7ba7d',
      blue: '#569cd6',
      magenta: '#c586c0',
      cyan: '#4ec9b0',
      white: '#d4d4d4',
      brightBlack: '#808080',
      brightRed: '#f44747',
      brightGreen: '#6a9955',
      brightYellow: '#d7ba7d',
      brightBlue: '#569cd6',
      brightMagenta: '#c586c0',
      brightCyan: '#4ec9b0',
      brightWhite: '#ffffff'
    },
    allowProposedApi: true
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  // Write content passed from Swift
  window.writeContent = function(data) {
    term.write(data);
    // After writing, report the actual content height
    setTimeout(function() {
      var rows = term.buffer.active.cursorY + 1;
      var lineHeight = 12 * 1.2; // fontSize * lineHeight
      var height = Math.max(rows * lineHeight + 16, 40);
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.terminalSize) {
        window.webkit.messageHandlers.terminalSize.postMessage({ height: height, rows: rows });
      }
    }, 50);
  };

  // Notify ready
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.terminalSize) {
    window.webkit.messageHandlers.terminalSize.postMessage({ height: 40, rows: 1, ready: true });
  }
})();
</script>
</body>
</html>
