<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
  #terminal { width: 100%; height: 100%; }
</style>
<link rel="stylesheet" href="Resources/xterm.min.css">
</head>
<body>
<div id="terminal"></div>
<script src="Resources/xterm.min.js"></script>
<script src="Resources/addon-fit.min.js"></script>
<script src="Resources/addon-web-links.min.js"></script>
<script>
(function() {
  const term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: 'Menlo, Monaco, "Courier New", monospace',
    theme: {
      background: '#1e1e1e',
      foreground: '#d4d4d4',
      cursor: '#d4d4d4',
      selectionBackground: '#264f78',
      black: '#1e1e1e',
      red: '#f44747',
      green: '#6a9955',
      yellow: '#d7ba7d',
      blue: '#569cd6',
      magenta: '#c586c0',
      cyan: '#4ec9b0',
      white: '#d4d4d4',
      brightBlack: '#808080',
      brightRed: '#f44747',
      brightGreen: '#6a9955',
      brightYellow: '#d7ba7d',
      brightBlue: '#569cd6',
      brightMagenta: '#c586c0',
      brightCyan: '#4ec9b0',
      brightWhite: '#ffffff'
    },
    allowProposedApi: true
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  let ws = null;

  // Receive connection config from Swift via postMessage
  window.addEventListener('message', function(e) {
    // Not used in WKWebView — Swift calls connectPTY directly
  });

  // Called from Swift: TerminalWebView.connectPTY(url)
  window.connectPTY = function(wsURL) {
    if (ws) { try { ws.close(); } catch(e) {} }

    term.writeln('\x1b[90mConnecting to ' + wsURL + '...\x1b[0m');
    ws = new WebSocket(wsURL);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      term.writeln('\x1b[32mConnected.\x1b[0m\r\n');
      // Send initial size
      const dims = fitAddon.proposeDimensions();
      if (dims) {
        ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
      }
    };

    ws.onmessage = function(event) {
      if (event.data instanceof ArrayBuffer) {
        term.write(new Uint8Array(event.data));
      } else {
        term.write(event.data);
      }
    };

    ws.onclose = function() {
      term.writeln('\r\n\x1b[90m[Connection closed]\x1b[0m');
      // Notify Swift
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.terminalEvent) {
        window.webkit.messageHandlers.terminalEvent.postMessage({ type: 'closed' });
      }
    };

    ws.onerror = function(e) {
      term.writeln('\r\n\x1b[31m[Connection error]\x1b[0m');
    };
  };

  // Terminal input → WebSocket
  term.onData(function(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(data);
    }
  });

  // Handle resize
  const resizeObserver = new ResizeObserver(function() {
    fitAddon.fit();
    if (ws && ws.readyState === WebSocket.OPEN) {
      const dims = fitAddon.proposeDimensions();
      if (dims) {
        ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
      }
    }
  });
  resizeObserver.observe(document.getElementById('terminal'));

  // Notify Swift that terminal is ready
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.terminalEvent) {
    window.webkit.messageHandlers.terminalEvent.postMessage({ type: 'ready' });
  }
})();
</script>
</body>
</html>
